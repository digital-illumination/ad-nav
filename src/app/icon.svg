<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <!-- Compass ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#b829e3" stroke-width="1.5" opacity="0.6"/>
  <!-- Cardinal ticks -->
  <line x1="16" y1="3.5" x2="16" y2="6" stroke="#00f0ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="16" y2="28.5" stroke="#00f0ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="3.5" y1="16" x2="6" y2="16" stroke="#00f0ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="26" y1="16" x2="28.5" y2="16" stroke="#00f0ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Needle - north (purple/pink) -->
  <polygon points="16,6 13.5,16 16,14.5 18.5,16" fill="#b829e3"/>
  <!-- Needle - south (cyan, dimmer) -->
  <polygon points="16,26 13.5,16 16,17.5 18.5,16" fill="#00f0ff" opacity="0.4"/>
  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1.5" fill="#00f0ff"/>
</svg>
